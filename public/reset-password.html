<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña - Sistema de Gestión</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            overflow: hidden;
            max-width: 500px;
            width: 100%;
        }

        .header {
            background: linear-gradient(135deg, #4a90e2, #357abd);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1rem;
            opacity: 0.9;
        }

        .content {
            padding: 40px 30px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: #4a90e2;
            box-shadow: 0 0 0 3px rgba(74, 144, 226, 0.1);
        }

        .btn {
            width: 100%;
            background: linear-gradient(135deg, #4a90e2, #357abd);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 15px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(74, 144, 226, 0.3);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: linear-gradient(135deg, #6c757d, #495057);
        }

        .status-message {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: 500;
        }

        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .back-link {
            text-align: center;
            margin-top: 20px;
        }

        .back-link a {
            color: #4a90e2;
            text-decoration: none;
            font-weight: 500;
        }

        .back-link a:hover {
            text-decoration: underline;
        }

        .loading {
            display: none;
            text-align: center;
            color: #6c757d;
        }

        .password-requirements {
            font-size: 0.9rem;
            color: #6c757d;
            margin-top: 5px;
        }

        @media (max-width: 480px) {
            .header {
                padding: 30px 20px;
            }
            
            .content {
                padding: 30px 20px;
            }
            
            .header h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔐 Recuperar Contraseña</h1>
            <p>Sistema de Gestión - Gobierno de Río Negro</p>
        </div>

        <div class="content">
            <div id="status-message"></div>

            <!-- Verificando token -->
            <div id="verifying-token" class="loading">
                <p>🔄 Verificando token de recuperación...</p>
            </div>

            <!-- Formulario para nueva contraseña -->
            <div id="reset-form" style="display: none;">
                <form id="passwordResetForm">
                    <div class="form-group">
                        <label for="email">Email:</label>
                        <input type="email" id="email" readonly>
                    </div>

                    <div class="form-group">
                        <label for="newPassword">Nueva Contraseña:</label>
                        <input type="password" id="newPassword" required minlength="6">
                        <div class="password-requirements">
                            Mínimo 6 caracteres
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="confirmPassword">Confirmar Contraseña:</label>
                        <input type="password" id="confirmPassword" required minlength="6">
                    </div>

                    <button type="submit" class="btn" id="resetBtn">
                        🔐 Cambiar Contraseña
                    </button>
                </form>
            </div>

            <!-- Token inválido -->
            <div id="invalid-token" style="display: none;">
                <div class="status-message error">
                    <h3>Token Inválido o Expirado</h3>
                    <p>El enlace de recuperación no es válido o ha expirado. Por favor, solicita un nuevo enlace de recuperación.</p>
                </div>
            </div>

            <div class="back-link">
                <a href="/">← Volver al inicio de sesión</a>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin;

        // Obtener token de la URL
        const urlParams = new URLSearchParams(window.location.search);
        const resetToken = urlParams.get('token');

        // Función para mostrar mensajes de estado
        function showStatus(message, type) {
            const statusDiv = document.getElementById('status-message');
            statusDiv.innerHTML = `<div class="status-message ${type}">${message}</div>`;
        }

        function clearStatus() {
            document.getElementById('status-message').innerHTML = '';
        }

        // Verificar token al cargar la página
        async function verifyToken() {
            if (!resetToken) {
                showInvalidToken();
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/api/auth/verify-reset-token/${resetToken}`);
                const result = await response.json();

                if (result.success) {
                    showResetForm(result.email);
                } else {
                    showInvalidToken();
                }
            } catch (error) {
                console.error('Error verificando token:', error);
                showInvalidToken();
            }
        }

        function showResetForm(email) {
            document.getElementById('verifying-token').style.display = 'none';
            document.getElementById('reset-form').style.display = 'block';
            document.getElementById('email').value = email;
        }

        function showInvalidToken() {
            document.getElementById('verifying-token').style.display = 'none';
            document.getElementById('invalid-token').style.display = 'block';
        }

        // Manejar envío del formulario
        document.getElementById('passwordResetForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const resetBtn = document.getElementById('resetBtn');

            // Validar que las contraseñas coincidan
            if (newPassword !== confirmPassword) {
                showStatus('Las contraseñas no coinciden', 'error');
                return;
            }

            if (newPassword.length < 6) {
                showStatus('La contraseña debe tener al menos 6 caracteres', 'error');
                return;
            }

            try {
                resetBtn.disabled = true;
                resetBtn.textContent = '🔄 Cambiando contraseña...';
                clearStatus();

                const response = await fetch(`${API_BASE}/api/auth/reset-password`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        token: resetToken,
                        newPassword: newPassword
                    }),
                });

                const result = await response.json();

                if (result.success) {
                    showStatus('✅ Contraseña actualizada exitosamente. Redirigiendo al inicio de sesión...', 'success');
                    
                    // Redirigir al login después de 3 segundos
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 3000);
                } else {
                    showStatus('❌ ' + result.message, 'error');
                    resetBtn.disabled = false;
                    resetBtn.textContent = '🔐 Cambiar Contraseña';
                }
            } catch (error) {
                console.error('Error:', error);
                showStatus('❌ Error al cambiar la contraseña. Inténtalo de nuevo.', 'error');
                resetBtn.disabled = false;
                resetBtn.textContent = '🔐 Cambiar Contraseña';
            }
        });

        // Verificar token al cargar la página
        document.addEventListener('DOMContentLoaded', verifyToken);
    </script>
</body>
</html>
