<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingreso al Sistema - Gobierno de Río Negro</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
            width: 100%;
            max-width: 450px;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-header {
            background: linear-gradient(135deg, #4a90e2, #357abd);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }

        .login-header h1 {
            font-size: 1.8rem;
            margin-bottom: 10px;
        }

        .login-header p {
            font-size: 1rem;
            opacity: 0.9;
        }

        .login-form {
            padding: 40px 30px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #333;
            font-size: 0.95rem;
        }

        input[type="email"], input[type="password"] {
            width: 100%;
            padding: 15px;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
            background: #f8f9fa;
        }

        input[type="email"]:focus, input[type="password"]:focus {
            outline: none;
            border-color: #4a90e2;
            box-shadow: 0 0 0 3px rgba(74, 144, 226, 0.1);
            background: white;
        }

        .btn {
            width: 100%;
            background: linear-gradient(135deg, #4a90e2, #357abd);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 20px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(74, 144, 226, 0.3);
        }

        .btn:disabled {
            background: #6c757d;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .status-message {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: 500;
            text-align: center;
        }

        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .recovery-link {
            text-align: center;
            margin-top: 20px;
        }

        .recovery-link a {
            color: #4a90e2;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .recovery-link a:hover {
            color: #357abd;
            text-decoration: underline;
        }

        .footer {
            text-align: center;
            padding: 20px;
            background: #f8f9fa;
            color: #6c757d;
            font-size: 0.9rem;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #4a90e2;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Recovery form styles */
        .recovery-form {
            display: none;
        }

        .recovery-form.active {
            display: block;
        }

        .back-btn {
            background: #6c757d;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            margin-bottom: 20px;
            transition: background 0.3s ease;
        }

        .back-btn:hover {
            background: #5a6268;
        }

        @media (max-width: 768px) {
            .login-container {
                margin: 10px;
                max-width: none;
            }
            
            .login-header {
                padding: 30px 20px;
            }
            
            .login-form {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>🔐 Ingreso al Sistema</h1>
            <p>Gobierno de la Provincia Río Negro</p>
        </div>

        <div class="login-form">
            <div id="status-message"></div>
            <div id="loading-indicator" class="loading">
                <div class="spinner"></div>
                <p>Verificando credenciales...</p>
            </div>

            <!-- Login Form -->
            <form id="loginForm" class="login-form-content">
                <div class="form-group">
                    <label for="email">📧 Correo Electrónico</label>
                    <input type="email" id="email" name="email" required 
                           placeholder="ejemplo@rionegro.gov.ar">
                </div>

                <div class="form-group">
                    <label for="password">🔑 Contraseña</label>
                    <input type="password" id="password" name="password" required 
                           placeholder="Ingresa tu contraseña">
                </div>

                <button type="submit" class="btn" id="loginBtn">
                    Iniciar Sesión
                </button>

                <div class="recovery-link">
                    <a href="#" onclick="showRecoveryForm()">¿Olvidaste tu contraseña?</a>
                </div>
            </form>

            <!-- Password Recovery Form -->
            <form id="recoveryForm" class="recovery-form">
                <button type="button" class="back-btn" onclick="showLoginForm()">
                    ← Volver al inicio de sesión
                </button>
                
                <h3 style="margin-bottom: 20px; color: #495057;">Recuperar Contraseña</h3>
                
                <div class="form-group">
                    <label for="recoveryEmail">📧 Correo Electrónico</label>
                    <input type="email" id="recoveryEmail" name="email" required 
                           placeholder="Ingresa tu correo electrónico">
                </div>

                <button type="submit" class="btn" id="recoveryBtn">
                    Enviar Solicitud de Recuperación
                </button>
            </form>
        </div>

        <div class="footer">
            <p>Sistema de Gestión de Datos - Cooperativas y Mutuales</p>
            <p>&copy; 2025 Gobierno de Río Negro</p>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin;

        // Elementos del DOM
        const loginForm = document.getElementById('loginForm');
        const recoveryForm = document.getElementById('recoveryForm');
        const statusMessage = document.getElementById('status-message');
        const loadingIndicator = document.getElementById('loading-indicator');
        const loginBtn = document.getElementById('loginBtn');
        const recoveryBtn = document.getElementById('recoveryBtn');

        // Función para mostrar mensajes de estado
        function showStatus(message, type) {
            statusMessage.innerHTML = `<div class="status-message ${type}">${message}</div>`;
        }

        function clearStatus() {
            statusMessage.innerHTML = '';
        }

        // Función para mostrar/ocultar loading
        function setLoading(isLoading) {
            if (isLoading) {
                loadingIndicator.classList.add('active');
                loginBtn.disabled = true;
                recoveryBtn.disabled = true;
            } else {
                loadingIndicator.classList.remove('active');
                loginBtn.disabled = false;
                recoveryBtn.disabled = false;
            }
        }

        // Alternar entre formularios
        function showRecoveryForm() {
            loginForm.style.display = 'none';
            recoveryForm.classList.add('active');
            clearStatus();
        }

        function showLoginForm() {
            recoveryForm.classList.remove('active');
            loginForm.style.display = 'block';
            clearStatus();
        }

        // Verificar si ya hay una sesión activa
        async function checkExistingSession() {
            const token = localStorage.getItem('authToken');
            if (token) {
                try {
                    const response = await fetch(`${API_BASE}/api/auth/verify`, {
                        headers: {
                            'Authorization': `Bearer ${token}`
                        }
                    });

                    if (response.ok) {
                        // Token válido, redirigir al sistema principal
                        window.location.href = '/app';
                        return;
                    }
                } catch (error) {
                    console.log('No hay sesión activa');
                }
                
                // Token inválido, eliminarlo
                localStorage.removeItem('authToken');
            }
        }

        // Manejar login
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            setLoading(true);
            clearStatus();

            try {
                const response = await fetch(`${API_BASE}/api/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ email, password }),
                });

                const result = await response.json();

                if (result.success) {
                    // Guardar token
                    localStorage.setItem('authToken', result.token);
                    
                    showStatus('✅ Ingreso exitoso. Redirigiendo...', 'success');
                    
                    // Redirigir después de un momento
                    setTimeout(() => {
                        window.location.href = '/app';
                    }, 1500);
                } else {
                    // Manejar errores específicos
                    if (result.message.includes('no registrado')) {
                        showStatus('⚠️ Usuario no registrado. Contacta a tu superior para obtener acceso al sistema.', 'error');
                    } else if (result.message.includes('contraseña')) {
                        showStatus('❌ Contraseña incorrecta.', 'error');
                        showRecoveryOption();
                    } else {
                        showStatus('❌ ' + result.message, 'error');
                    }
                }
            } catch (error) {
                console.error('Error en login:', error);
                showStatus('❌ Error de conexión. Intenta nuevamente.', 'error');
            } finally {
                setLoading(false);
            }
        });

        // Mostrar opción de recuperación después de error de contraseña
        function showRecoveryOption() {
            setTimeout(() => {
                const currentStatus = statusMessage.innerHTML;
                statusMessage.innerHTML = currentStatus + 
                    '<div style="margin-top: 15px; text-align: center;">' +
                    '<a href="#" onclick="showRecoveryForm()" style="color: #4a90e2; text-decoration: none; font-weight: 500;">¿Deseas recuperar tu contraseña?</a>' +
                    '</div>';
            }, 2000);
        }

        // Manejar recuperación de contraseña
        recoveryForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('recoveryEmail').value;

            setLoading(true);
            clearStatus();

            try {
                const response = await fetch(`${API_BASE}/api/password-reset/request`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ email }),
                });

                const result = await response.json();

                if (result.success) {
                    showStatus('✅ Se ha enviado un enlace de recuperación a tu correo electrónico. Revisa tu bandeja de entrada.', 'success');
                    
                    // Limpiar formulario y volver al login después de un momento
                    setTimeout(() => {
                        document.getElementById('recoveryEmail').value = '';
                        showLoginForm();
                    }, 3000);
                } else {
                    if (result.message.includes('no encontrado')) {
                        showStatus('⚠️ El correo electrónico no está registrado en el sistema. Contacta a tu superior.', 'error');
                    } else {
                        showStatus('❌ ' + result.message, 'error');
                    }
                }
            } catch (error) {
                console.error('Error en recuperación:', error);
                showStatus('❌ Error de conexión. Intenta nuevamente.', 'error');
            } finally {
                setLoading(false);
            }
        });

        // Verificar sesión al cargar la página
        document.addEventListener('DOMContentLoaded', function() {
            checkExistingSession();
        });
    </script>
</body>
</html>
