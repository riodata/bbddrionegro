<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gobierno de Río Negro - Sistema de Gestión</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
        }
        
        .redirect-container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            padding: 40px;
            text-align: center;
            max-width: 400px;
        }
        
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #4a90e2;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        h1 {
            color: #4a90e2;
            margin-bottom: 15px;
            font-size: 1.5rem;
        }
        
        p {
            color: #6c757d;
            margin-bottom: 20px;
        }
        
        .manual-link {
            display: inline-block;
            color: #4a90e2;
            text-decoration: none;
            font-weight: 500;
            padding: 10px 20px;
            border: 2px solid #4a90e2;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        
        .manual-link:hover {
            background: #4a90e2;
            color: white;
        }
    </style>
</head>
<body>
    <div class="redirect-container">
        <div class="spinner"></div>
        <h1>🔐 Redirigiendo al Sistema de Ingreso</h1>
        <p>Verificando sesión...</p>
        <a href="/login.html" class="manual-link">Ir al Login</a>
    </div>

    <script>
        // Verificar si hay token de sesión
        const token = localStorage.getItem('authToken');
        
        if (token) {
            // Verificar si el token es válido
            fetch('/api/auth/verify', {
                headers: {
                    'Authorization': `Bearer ${token}`
                }
            })
            .then(response => {
                if (response.ok) {
                    // Token válido, ir al app
                    window.location.href = '/app.html';
                } else {
                    // Token inválido, ir al login
                    localStorage.removeItem('authToken');
                    window.location.href = '/login.html';
                }
            })
            .catch(() => {
                // Error de conexión, ir al login
                window.location.href = '/login.html';
            });
        } else {
            // No hay token, ir al login
            setTimeout(() => {
                window.location.href = '/login.html';
            }, 1000);
        }
    </script>
</body>
</html>
